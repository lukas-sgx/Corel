apiVersion: apps/v1
kind: Deployment
metadata:
  name: rcephp
  labels:
    app: rcephp
spec:
  replicas: 3
  selector:
    matchLabels:
      app: rcephp
  template:
    metadata:
      labels:
        app: rcephp
    spec:
      nodeSelector:
        kubernetes.io/hostname: corel-demo-control-plane
      tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"
      containers:
      - name: rcephp
        image: rcephp:v1.0.0
        imagePullPolicy: IfNotPresent
        resources:
          limits:
            memory: 512Mi
            cpu: "1"
          requests:
            memory: 256Mi
            cpu: "0.2"   
        ports:
          - containerPort: 80
            hostPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: rcephp-service
spec:
  type: ClusterIP
  selector:
    app: rcephp
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP

