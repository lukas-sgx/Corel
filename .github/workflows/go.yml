name: CI Pipeline

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  Quality-Checks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache: 'true'

    - name: Sanity check
      run: go vet ./...

    - name: Lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: latest
        args: --timeout=5m
  
  Integrity-Tests:
    needs: Quality-Checks
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache: 'true'

    - name: Check sum
      run: |
        go mod tidy
        git diff --exit-code go.mod
    - name: govulncheck
      run: |
        go install golang.org/x/vuln/cmd/govulncheck@latest
        govulncheck ./...

    - name: Run tests
      run: |
        go test -race -coverprofile=coverage.out -covermode=atomic ./...
        go tool cover -func=coverage.out

    - uses: actions/upload-artifact@v7
      with:
        name: coverage
        path: coverage.out

  Build-Release:
    strategy:
      matrix:
        os: [windows, linux, darwin]
        arch: [amd64, arm64]
    runs-on: ubuntu-latest
    needs: Integrity-Tests
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache: 'true'
    
    - name: Build
      run: |
        GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -o bin/corel-${{ matrix.os }}-${{ matrix.arch }} .
      
    - uses: actions/upload-artifact@v7
      with:
        name: corel-${{ matrix.os }}-${{ matrix.arch }}
        path: bin/
        retention-days: 7

  Deploy:
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
    needs: Build-Release
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    permissions:
      packages: write
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .github/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=app-cache
          cache-to: type=gha,mode=max,scope=app-cache
          provenance: false 
          sbom: false