# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  Quality-Checks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache: 'true'

    - name: Sanity check
      run: go vet ./...

    - name: Lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: latest
        args: --timeout=5m
  
  Integrity-Tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache: 'true'

    - name: Check sum
      run: |
        go mod tidy
        git diff --exit-code go.mod
    - name: govulncheck
      run: |
        go install golang.org/x/vuln/cmd/govulncheck@latest
        govulncheck ./...

    - name: Run tests
      run: |
        go test -race -coverprofile=coverage.out -covermode=atomic ./...
        go tool cover -func=coverage.out

    - uses: actions/upload-artifact@v7
      with:
        name: coverage
        path: coverage.out

  Build-Release:
    strategy:
      matrix:
        os: [windows, linux, darwin]
        arch: [amd64, arm64]
    runs-on: ubuntu-latest
    needs: Integrity-Tests
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache: 'true'
    
    - name: Build
      run: |
        GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -o bin/corel-${{ matrix.os }}-${{ matrix.arch }} .
      
    - uses: actions/upload-artifact@v7
      with:
        name: corel-${{ matrix.os }}-${{ matrix.arch }}
        path: dist/
        retention-days: 7